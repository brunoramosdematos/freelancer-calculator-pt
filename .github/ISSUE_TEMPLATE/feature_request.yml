name: Feature request
description: Suggest a product or maintenance improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: locale
    attributes:
      label: Locale impact
      options:
        - No copy changes expected
        - English
        - Portugues (Portugal)
        - Portugues (Brasil)
        - Multiple locales
  - type: dropdown
    id: theme
    attributes:
      label: Theme impact
      options:
        - No visual change expected
        - System
        - Light
        - Dark
        - Multiple themes
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: screenshots
    attributes:
      label: Mockups or screenshots
      description: Optional. Do not include private financial data.
